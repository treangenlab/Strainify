{% set version = "0.1.0" %}

package:
  name: strainify
  version: {{ version }}

source:
  url: https://github.com/treangenlab/Strainify/archive/refs/tags/v{{ version }}.tar.gz
  # sha256: <fill in after tagging>

build:
  number: 0
  noarch: generic
  script: bash recipes/build.sh

requirements:
  host:
    - bash
  run:
    # Workflow engine
    - nextflow >=26.04
    # Python runtime
    - python >=3.10
    - biopython >=1.85
    - pandas >=2.2
    - numpy >=2.2
    - pysam >=0.23
    - scipy >=1.15
    - scikit-learn >=1.6
    - cvxpy >=1.6
    - clarabel >=0.10
    - ecos >=2.0
    - osqp >=1.0
    - scs >=3.2
    - joblib >=1.5
    - psutil >=7.0
    - threadpoolctl >=3.6
    - tqdm >=4.67
    - pulp >=2.8
    - coincbc
    - pyyaml >=6.0
    # Bioinformatics tools
    - bwa >=0.7.18
    - samtools >=1.21
    - htslib >=1.21
    - bcftools >=1.21
    - parsnp >=2.1.4
    - harvesttools >=1.2
    - wgatools >=1.1.0
    - fastani >=1.34
    - fasttree >=2.1.11
    - mash >=2.3
    - phipack >=1.1
    - raxml >=8.2.13
    - parallel

test:
  commands:
    - strainify --help

about:
  home: https://github.com/treangenlab/Strainify
  license: MIT
  license_file: LICENSE
  summary: Strain-level microbiome profiling for low-coverage short-read metagenomic datasets
  description: |
    Strainify is an accurate strain-level abundance analysis tool for short-read
    metagenomics. It uses whole-genome alignments (parsnp) to identify variant
    sites, maps metagenomic reads to a reference, and estimates strain abundances
    via maximum likelihood.
  doc_url: https://github.com/treangenlab/Strainify/blob/main/README.md
  dev_url: https://github.com/treangenlab/Strainify
