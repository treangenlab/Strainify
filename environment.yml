# strainify + MAGNET prefilter environment.
name: strainify
channels:
  - conda-forge
  - bioconda
dependencies:
  # --- Core ---
  - python=3.12
  - pip
  - nextflow>=26.04
 
  # --- Scientific Python stack (conda-forge) ---
  - numpy>=2.2
  - pandas>=2.2
  - scipy>=1.15
  - scikit-learn>=1.6
  - joblib>=1.5
  - threadpoolctl>=3.6
  - biopython>=1.85
  - pysam>=0.23
  - psutil>=7.0
  - tqdm>=4.67
  - pyyaml>=6.0
  - pytest>=8.3
 
  # --- Optimization / LP+convex stack ---
  # Listing cvxpy plus its solvers with floors lets conda pick a mutually
  # compatible build set (cvxpy pulls matching solver versions itself).
  - pulp>=2.8
  - coincbc
  - cvxpy>=1.6
  - clarabel>=0.10
  - ecos>=2.0
  - osqp>=1.0
  - scs>=3.2
 
  # --- Taxonomy (MAGNET) ---
  - ete3>=3.1.3
 
  # --- Bioinformatics tools (exact pins: reproducible tool output) ---
  - bcftools=1.21
  - samtools=1.21
  - htslib=1.21
  - bwa=0.7.18
  - fastani=1.34
  - fasttree=2.1.11
  - harvesttools=1.2
  - mash=2.3
  - parsnp=2.1.4
  - phipack=1.1
  - pyspoa=0.2.1
  - raxml=8.2.13
  - wgatools=1.1.0
  - parallel
  - minimap2            # MAGNET prefilter
  - ncbi-datasets-cli   # MAGNET prefilter
 
  # --- Repo tooling ---
  - git-filter-repo>=2.47
 
  # --- pip: only non-conda / local installs (keep this minimal for packaging) ---
  - pip:
      - legacy-cgi